services:
  mysql:
    image: mysql:8.4
    container_name: abbatech-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: refresh
      MYSQL_USER: refresh
      MYSQL_PASSWORD: refresh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: abbatech-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: abbatech-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: abbatech-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3333:3333"
    depends_on:
      - mysql
      - minio
      - mailpit

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    container_name: abbatech-portal
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INTERNAL_API_URL: http://api:3333/api/v1
    ports:
      - "3100:3000"
    depends_on:
      - api

  refresh:
    build:
      context: .
      dockerfile: apps/refresh/Dockerfile
    container_name: abbatech-refresh
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INTERNAL_API_URL: http://api:3333/api/v1
    ports:
      - "3101:3000"
    depends_on:
      - api

volumes:
  mysql_data:
  minio_data:
