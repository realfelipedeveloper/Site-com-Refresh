x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-refresh}
  MYSQL_USER: ${MYSQL_USER:-refresh}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  DATABASE_URL: ${DATABASE_URL}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
  NEXT_PUBLIC_REFRESH_URL: ${NEXT_PUBLIC_REFRESH_URL}
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  INTERNAL_API_URL: ${INTERNAL_API_URL}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  COOKIE_SECRET: ${COOKIE_SECRET}
  API_PORT: ${API_PORT:-3333}
  CORS_ORIGINS: ${CORS_ORIGINS}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_FROM: ${SMTP_FROM}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  LGPD_DPO_NAME: ${LGPD_DPO_NAME}
  LGPD_DPO_EMAIL: ${LGPD_DPO_EMAIL}
  LGPD_RETENTION_DAYS: ${LGPD_RETENTION_DAYS:-365}
  ADMIN_EMAIL: ${ADMIN_EMAIL}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-refresh}
      MYSQL_USER: ${MYSQL_USER:-refresh}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_prod_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - mysql
      - minio
    networks:
      - default
      - dokploy-network

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      INTERNAL_API_URL: http://api:3333/api/v1
    depends_on:
      - api
    networks:
      - default
      - dokploy-network

  refresh:
    build:
      context: .
      dockerfile: apps/refresh/Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      INTERNAL_API_URL: http://api:3333/api/v1
    depends_on:
      - api
    networks:
      - default
      - dokploy-network

volumes:
  mysql_prod_data:
  minio_prod_data:

networks:
  dokploy-network:
    external: true
